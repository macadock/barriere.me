name: Deploy
on:
  push:
    branches:
      - main
  workflow_dispatch:


jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    env:
      INFRA_DIR: 'packages/infra'
      SUPABASE_DIR: 'packages/supabase'
      API_DIR: 'apps/api'
      FRONTEND_DIR: 'apps/frontend'


      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_ENDPOINT_URL_S3: ${{ secrets.AWS_ENDPOINT_URL_S3 }}

      TF_VAR_HOSTNAME: ${{ secrets.HOSTNAME }}
      TF_VAR_CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      TF_VAR_CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      TF_VAR_ENVIRONMENT: 'production'
      TF_VAR_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      TF_VAR_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

    steps:
    - name: Checkout
      id: checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      id: install-dependencies
      run: npm install
      shell: bash

    - name: Build api
      id: build-api
      uses: cloudflare/wrangler-action@v3
      with:
        workingDirectory: ${{ env.API_DIR }}
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        command: deploy --dry-run --minify --outdir dist

    - name: Build frontend
      id: build-frontend
      run: npm run build
      shell: bash

    - name: Setup Supabase CLI
      id: setup-supabase-cli
      uses: supabase/setup-cli@v1
      with:
        version: latest

    - run: |
        supabase link --project-ref $SUPABASE_PROJECT_ID
        supabase db push
      shell: bash
      working-directory: ${{ env.SUPABASE_DIR }}

    - name: Setup Terraform
      id: setup-terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      id: terraform-init
      run: terraform init
      shell: bash
      working-directory: ${{ env.INFRA_DIR }}

    - name: Terraform Format
      id: terraform-format
      run: terraform fmt -check
      shell: bash
      working-directory: ${{ env.INFRA_DIR }}

    - name: Terraform Plan
      id: terraform-plan
      run: terraform plan -input=false
      shell: bash
      working-directory: ${{ env.INFRA_DIR }}

    - name: Terraform Apply
      id: terraform-apply
      shell: bash
      working-directory: ${{ env.INFRA_DIR }}
      run: terraform apply -auto-approve -input=false

    - name: Deploy frontend
      id: deploy-frontend
      uses: cloudflare/wrangler-action@v3
      with:
        workingDirectory: ${{ env.FRONTEND_DIR }}
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        command: pages deploy


